name: Auto Release

on:
  push:
    tags:
      - 'v*'

# 権限の許可を追加（これで「Resource not accessible」が治ります）
permissions:
  contents: write

env:
  # Node.js 24への強制移行警告を消す（2026年仕様）
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish **/*.vbproj --configuration Release --runtime win-x64 --self-contained false -o ./publish_output

      - name: Zip Artifacts
        run: |
          Compress-Archive -Path ./publish_output/* -DestinationPath VersioupTestProject.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: VersioupTestProject.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}